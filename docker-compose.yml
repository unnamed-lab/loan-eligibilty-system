services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: loan
      POSTGRES_PASSWORD: loan
      POSTGRES_DB: loan_eligibility
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loan"]
      interval: 5s
      timeout: 3s
      retries: 5

  inference-engine:
    build: ./inference-engine
    environment:
      MODEL_PATH: /app/models/model.onnx
      PORT: 8081
    ports: ["8081:8081"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  shap-service:
    build: ./shap-service
    volumes:
      - ./shared:/shared:ro
    environment:
      PYTHONUNBUFFERED: "1"
    ports: ["8000:8000"]

  api-gateway:
    build: ./api-gateway
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 3600s
      # Prisma reads DATABASE_URL
      DATABASE_URL: postgresql://loan:loan@postgres:5432/loan_eligibility?schema=public
      INFERENCE_URL: http://inference-engine:8081
      SHAP_URL: http://shap-service:8000
      FEATURE_CONTRACT_PATH: /shared/feature-contract.json
    volumes:
      - ./shared:/shared:ro
    ports: ["3000:3000"]

volumes:
  pgdata:
